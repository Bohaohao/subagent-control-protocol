interface:
  display_name: Subagent Orchestrator
  short_description: Lets Codex delegate bounded work to mixed Claude and Codex worker subagents from a single todoList, with parallel implementation, mandatory dual read-only review (software-engineering + real-user), runtime-aware dispatch (SCP MCP for claude, multi_agent_v1.spawn_agent for Codex workers), and structured result summaries.
  default_prompt: Use subagents to work on this task. Codex should infer decomposition into a single todoList, dispatch each todo by runtime — claude via subagent_run_task/subagent_run_many (SCP MCP), Codex worker aliases like huoshan/zhipu via multi_agent_v1.spawn_agent (resolve xxx to xxx-worker, then normal-worker, else mark blocked) — run two read-only review agents (software-engineering and real-user) after implementation regardless of implementer runtime, normalize results per runtime, integrate implementation plus both reviews, optionally do targeted fixes, then summarize the integrated result. For Codex worker todos only (runtime codex, dispatcher codex-worker), if wait_agent final status/final message clearly indicates 429/rate limit/too many requests/限流, send exactly 继续 via send_input and wait again, up to 3 attempts per worker — a budget separate from the one-time JSON-result repair follow-up, and terminal/final-message based only (no mid-run detection); note in the final summary whether auto-continue was used and whether recovery succeeded.
